services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./data:/app/data
    networks:
      - ms-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9000:80"
    networks:
      - ms-net
    depends_on:
      - app

  # proxy закомментирован — используется хостовой nginx
  # proxy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "8081:80"
  #     - "8443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy-data:/data
  #     - caddy-config:/config
  #   networks:
  #     - ms-net
  #   depends_on:
  #     - frontend
  #     - app

networks:
  ms-net:
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
